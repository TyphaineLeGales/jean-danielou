backend:
  name: github
  repo: TyphaineLeGales/jean-danielou
  branch: main
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "books_en"
    label: "Books EN"
    folder: "src/content/books_en"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Year", name: "date", widget: "string" }
      - { label: "Featured Image", name: "thumbnail", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "books_fr"
    label: "Books FR"
    folder: "src/content/books_fr"
    create: true
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Année de publication", name: "date", widget: "string" }
      - { label: "Image", name: "thumbnail", widget: "image" }
      - { label: "Description", name: "body", widget: "markdown" }