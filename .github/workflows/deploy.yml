name: Build and Deploy to Infomaniak (SSH)

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.*"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (Astro requires 22+)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: "pnpm"

      # 3. Setup pnpm
      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build Astro site
      - name: Build site
        run: pnpm build

      # 6. Deploy via rsync over SSH
      - name: Deploy to Infomaniak (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --quiet
          path: dist/
          remote_path: /sites/jeandanielou.com/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}