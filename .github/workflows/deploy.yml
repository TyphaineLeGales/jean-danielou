name: Build and Deploy to Infomaniak (SSH)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: "pnpm"

      # 3. Enable pnpm (IMPORTANT: must be BEFORE install)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4. Verify pnpm exists (debug step - safe to remove later)
      - name: Check pnpm
        run: pnpm -v

      # 5. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 6. Build Astro site
      - name: Build site
        run: pnpm build

      # 7. Deploy via rsync SSH
      - name: Deploy to Infomaniak
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /sites/jeandanielou.com/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}